services:
  db:
    image: mysql:8.0
    container_name: expense-db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=expense_tracker
      - MYSQL_ROOT_PASSWORD=password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: expense-backend
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:mysql://db:3306/expense_tracker?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - DB_USERNAME=root
      - DB_PASSWORD=password
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: expense-frontend
    ports:
      - "8085:80"
    depends_on:
      - backend

