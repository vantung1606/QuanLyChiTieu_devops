services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_DATABASE: expense_tracker
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: expense-backend
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:mysql://mysql-db:3306/expense_tracker?allowPublicKeyRetrieval=true&useSSL=false
      - DB_USERNAME=root
      - DB_PASSWORD=password
    depends_on:
      mysql-db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: expense-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8081/api
    depends_on:
      - backend

volumes:
  mysql-data:
